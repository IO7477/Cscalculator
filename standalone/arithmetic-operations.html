<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arithmetic Operations - Standalone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  
  <script type="module">
    import React from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    
    const { useState } = React;
    
    function ArithmeticOperations() {
      const [operand1, setOperand1] = useState('');
      const [operand2, setOperand2] = useState('');
      const [base1, setBase1] = useState(2);
      const [base2, setBase2] = useState(2);
      const [operation, setOperation] = useState('add');
      const [outputBase, setOutputBase] = useState(16);
      const [result, setResult] = useState('');

      const performCalculation = () => {
        if (!operand1 || !operand2) {
          setResult('');
          return;
        }

        try {
          const decimal1 = parseInt(operand1, base1);
          const decimal2 = parseInt(operand2, base2);

          if (isNaN(decimal1) || isNaN(decimal2)) {
            setResult('Error: Invalid input');
            return;
          }

          let resultDecimal;
          switch (operation) {
            case 'add':
              resultDecimal = decimal1 + decimal2;
              break;
            case 'subtract':
              resultDecimal = Math.abs(decimal1 - decimal2);
              break;
            case 'multiply':
              resultDecimal = decimal1 * decimal2;
              break;
            case 'divide':
              if (decimal2 === 0) {
                setResult('Error: Division by zero');
                return;
              }
              resultDecimal = Math.floor(decimal1 / decimal2);
              break;
            default:
              resultDecimal = 0;
          }

          setResult(resultDecimal.toString(outputBase).toUpperCase());
        } catch (e) {
          setResult('Error: Invalid operation');
        }
      };

      return React.createElement('div', { className: 'min-h-screen bg-gray-50 p-6' },
        React.createElement('div', { className: 'max-w-2xl mx-auto' },
          
          // Header
          React.createElement('header', { className: 'bg-gradient-to-r from-blue-600 to-purple-600 text-white px-6 py-8 rounded-3xl shadow-lg mb-6' },
            React.createElement('h1', { className: 'text-3xl font-bold' }, 'Arithmetic Operations'),
            React.createElement('p', { className: 'text-blue-100 mt-2' }, 'Add, subtract, multiply, divide in any base')
          ),
          
          // Operand 1
          React.createElement('div', { className: 'bg-white rounded-2xl p-6 shadow-sm mb-4' },
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'Operand 1'),
            React.createElement('input', {
              type: 'text',
              value: operand1,
              onChange: (e) => setOperand1(e.target.value.toUpperCase()),
              placeholder: 'Enter first number',
              className: 'w-full bg-gray-50 text-xl font-bold text-gray-900 outline-none p-4 rounded-xl border-2 border-gray-200 focus:border-blue-500 transition-all mb-3'
            }),
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'Base'),
            React.createElement('input', {
              type: 'number',
              min: '2',
              max: '36',
              value: base1,
              onChange: (e) => setBase1(Number(e.target.value)),
              className: 'w-full bg-gray-50 text-lg font-bold text-gray-900 outline-none p-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 transition-all'
            })
          ),
          
          // Operation Selector
          React.createElement('div', { className: 'bg-white rounded-2xl p-6 shadow-sm mb-4' },
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'Operation'),
            React.createElement('div', { className: 'grid grid-cols-4 gap-2' },
              [
                { id: 'add', label: '+' },
                { id: 'subtract', label: '−' },
                { id: 'multiply', label: '×' },
                { id: 'divide', label: '÷' }
              ].map(op =>
                React.createElement('button', {
                  key: op.id,
                  onClick: () => setOperation(op.id),
                  className: `py-4 px-4 rounded-xl font-bold text-2xl transition-all ${
                    operation === op.id
                      ? 'bg-blue-600 text-white shadow-md'
                      : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                  }`
                }, op.label)
              )
            )
          ),
          
          // Operand 2
          React.createElement('div', { className: 'bg-white rounded-2xl p-6 shadow-sm mb-4' },
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'Operand 2'),
            React.createElement('input', {
              type: 'text',
              value: operand2,
              onChange: (e) => setOperand2(e.target.value.toUpperCase()),
              placeholder: 'Enter second number',
              className: 'w-full bg-gray-50 text-xl font-bold text-gray-900 outline-none p-4 rounded-xl border-2 border-gray-200 focus:border-blue-500 transition-all mb-3'
            }),
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'Base'),
            React.createElement('input', {
              type: 'number',
              min: '2',
              max: '36',
              value: base2,
              onChange: (e) => setBase2(Number(e.target.value)),
              className: 'w-full bg-gray-50 text-lg font-bold text-gray-900 outline-none p-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 transition-all'
            })
          ),
          
          // Output Base
          React.createElement('div', { className: 'bg-white rounded-2xl p-6 shadow-sm mb-4' },
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'Output Base'),
            React.createElement('input', {
              type: 'number',
              min: '2',
              max: '36',
              value: outputBase,
              onChange: (e) => setOutputBase(Number(e.target.value)),
              className: 'w-full bg-gray-50 text-lg font-bold text-gray-900 outline-none p-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 transition-all'
            })
          ),
          
          // Calculate Button
          React.createElement('button', {
            onClick: performCalculation,
            className: 'w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold text-lg shadow-md transition-all mb-4'
          }, 'Calculate'),
          
          // Result
          result && React.createElement('div', { className: 'bg-gradient-to-br from-blue-50 to-purple-50 rounded-2xl p-6 shadow-sm border-2 border-blue-200' },
            React.createElement('label', { className: 'text-xs font-semibold text-blue-700 uppercase tracking-wide mb-2 block' }, 'Result'),
            React.createElement('div', { className: 'text-3xl font-bold text-gray-900 break-all' }, result),
            React.createElement('p', { className: 'text-sm text-gray-600 mt-2' }, `Base ${outputBase}`)
          )
        )
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ArithmeticOperations));
  </script>
</body>
</html>
