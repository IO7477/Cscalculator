<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1's & 2's Complement Calculator - Standalone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  
  <script type="module">
    import React from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    
    const { useState } = React;
    
    function ComplementCalculator() {
      const [binaryInput, setBinaryInput] = useState('');
      const [bitWidth, setBitWidth] = useState(8);
      const [onesComplement, setOnesComplement] = useState('');
      const [twosComplement, setTwosComplement] = useState('');

      const validateBinary = (value) => {
        return /^[01]+$/.test(value);
      };

      const calculateComplements = (binary) => {
        if (!binary || !validateBinary(binary)) {
          setOnesComplement('');
          setTwosComplement('');
          return;
        }

        // Pad to bit width
        const padded = binary.padStart(bitWidth, '0').slice(-bitWidth);

        // 1's complement - invert all bits
        const ones = padded.split('').map(bit => bit === '0' ? '1' : '0').join('');
        setOnesComplement(ones);

        // 2's complement - add 1 to 1's complement
        let carry = 1;
        const twos = ones.split('').reverse().map(bit => {
          const sum = parseInt(bit) + carry;
          carry = sum > 1 ? 1 : 0;
          return (sum % 2).toString();
        }).reverse().join('');
        setTwosComplement(twos);
      };

      const handleInputChange = (value) => {
        const filtered = value.replace(/[^01]/g, '');
        setBinaryInput(filtered);
        calculateComplements(filtered);
      };

      return React.createElement('div', { className: 'min-h-screen bg-gray-50 p-6' },
        React.createElement('div', { className: 'max-w-2xl mx-auto' },
          
          // Header
          React.createElement('header', { className: 'bg-gradient-to-r from-blue-600 to-purple-600 text-white px-6 py-8 rounded-3xl shadow-lg mb-6' },
            React.createElement('h1', { className: 'text-3xl font-bold' }, "1's & 2's Complement"),
            React.createElement('p', { className: 'text-blue-100 mt-2' }, 'Calculate complements of binary numbers')
          ),
          
          // Bit Width Selector
          React.createElement('div', { className: 'bg-white rounded-2xl p-6 shadow-sm mb-4' },
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'Bit Width'),
            React.createElement('div', { className: 'flex gap-2' },
              [4, 8, 16, 32].map(width =>
                React.createElement('button', {
                  key: width,
                  onClick: () => {
                    setBitWidth(width);
                    calculateComplements(binaryInput);
                  },
                  className: `flex-1 py-3 px-4 rounded-xl font-semibold transition-all ${
                    bitWidth === width
                      ? 'bg-blue-600 text-white shadow-md'
                      : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                  }`
                }, `${width}-bit`)
              )
            )
          ),
          
          // Binary Input
          React.createElement('div', { className: 'bg-white rounded-2xl p-6 shadow-sm mb-4' },
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'Binary Input'),
            React.createElement('input', {
              type: 'text',
              value: binaryInput,
              onChange: (e) => handleInputChange(e.target.value),
              placeholder: '10101010',
              className: 'w-full bg-gray-50 text-2xl font-mono font-bold text-gray-900 outline-none p-4 rounded-xl border-2 border-gray-200 focus:border-blue-500 transition-all'
            }),
            React.createElement('p', { className: 'text-xs mt-2 text-gray-500 font-medium' }, 
              `Enter binary number (max ${bitWidth} bits)`
            )
          ),
          
          // 1's Complement Result
          onesComplement && React.createElement('div', { className: 'bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl p-6 shadow-sm border-2 border-green-200 mb-4' },
            React.createElement('label', { className: 'text-xs font-semibold text-green-700 uppercase tracking-wide mb-2 block' }, "1's Complement"),
            React.createElement('div', { className: 'text-3xl font-mono font-bold text-gray-900 break-all' }, onesComplement),
            React.createElement('p', { className: 'text-sm text-gray-600 mt-2' }, 'All bits inverted')
          ),
          
          // 2's Complement Result
          twosComplement && React.createElement('div', { className: 'bg-gradient-to-br from-blue-50 to-purple-50 rounded-2xl p-6 shadow-sm border-2 border-blue-200' },
            React.createElement('label', { className: 'text-xs font-semibold text-blue-700 uppercase tracking-wide mb-2 block' }, "2's Complement"),
            React.createElement('div', { className: 'text-3xl font-mono font-bold text-gray-900 break-all' }, twosComplement),
            React.createElement('p', { className: 'text-sm text-gray-600 mt-2' }, "1's complement + 1")
          ),
          
          // Quick Presets
          React.createElement('div', { className: 'mt-6' },
            React.createElement('h3', { className: 'text-sm font-semibold text-gray-700 mb-3' }, 'Quick Presets'),
            React.createElement('div', { className: 'grid grid-cols-2 gap-3' },
              [
                { label: 'All Ones', value: '11111111' },
                { label: 'All Zeros', value: '00000000' },
                { label: 'Alternating', value: '10101010' },
                { label: 'Max Positive', value: '01111111' }
              ].map((preset, idx) =>
                React.createElement('button', {
                  key: idx,
                  onClick: () => handleInputChange(preset.value),
                  className: 'bg-white hover:bg-gray-50 rounded-xl p-4 shadow-sm border border-gray-200 text-left transition-all'
                },
                  React.createElement('p', { className: 'text-sm font-semibold text-gray-900' }, preset.label),
                  React.createElement('p', { className: 'text-xs font-mono text-gray-500 mt-1' }, preset.value)
                )
              )
            )
          )
        )
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ComplementCalculator));
  </script>
</body>
</html>
