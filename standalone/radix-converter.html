<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radix Converter - Standalone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  
  <script type="module">
    import React from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    
    const { useState, useEffect } = React;
    
    function RadixConverter() {
      const [inputValue, setInputValue] = useState('');
      const [baseFrom, setBaseFrom] = useState(10);
      const [baseTo, setBaseTo] = useState(16);
      const [result, setResult] = useState('');
      const [error, setError] = useState('');

      const isValidDigit = (digit, base) => {
        const validChars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const maxChar = validChars[base - 1];
        return digit >= '0' && digit <= maxChar;
      };

      const validateInput = (value, base) => {
        if (!value) {
          setError('');
          return false;
        }

        for (const char of value.toUpperCase()) {
          if (!isValidDigit(char, base)) {
            setError(`Invalid digit '${char}' for base ${base}`);
            return false;
          }
        }

        setError('');
        return true;
      };

      const convertNumber = (value, fromBase, toBase) => {
        if (!value) return '';
        
        try {
          const decimal = parseInt(value.toUpperCase(), fromBase);
          if (isNaN(decimal)) return '';
          return decimal.toString(toBase).toUpperCase();
        } catch (e) {
          return '';
        }
      };

      useEffect(() => {
        if (validateInput(inputValue, baseFrom)) {
          const converted = convertNumber(inputValue, baseFrom, baseTo);
          setResult(converted);
        } else {
          setResult('');
        }
      }, [inputValue, baseFrom, baseTo]);

      const handleSwap = () => {
        const temp = baseFrom;
        setBaseFrom(baseTo);
        setBaseTo(temp);
        if (result) setInputValue(result);
      };

      return React.createElement('div', { className: 'min-h-screen bg-gray-50 p-6' },
        React.createElement('div', { className: 'max-w-2xl mx-auto' },
          
          // Header
          React.createElement('header', { className: 'bg-gradient-to-r from-blue-600 to-purple-600 text-white px-6 py-8 rounded-3xl shadow-lg mb-6' },
            React.createElement('h1', { className: 'text-3xl font-bold' }, 'Radix Converter'),
            React.createElement('p', { className: 'text-blue-100 mt-2' }, 'Convert numbers between bases 2-36')
          ),
          
          // Input Section
          React.createElement('div', { className: 'bg-white rounded-2xl p-6 shadow-sm mb-4' },
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'Input Number'),
            React.createElement('input', {
              type: 'text',
              value: inputValue,
              onChange: (e) => setInputValue(e.target.value.toUpperCase()),
              placeholder: 'Enter value',
              className: 'w-full bg-gray-50 text-2xl font-bold text-gray-900 outline-none p-4 rounded-xl border-2 border-gray-200 focus:border-blue-500 transition-all'
            }),
            error && React.createElement('p', { className: 'text-xs mt-2 text-red-600 font-medium' }, error)
          ),
          
          // Base From
          React.createElement('div', { className: 'bg-white rounded-2xl p-6 shadow-sm mb-4' },
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'From Base'),
            React.createElement('input', {
              type: 'number',
              min: '2',
              max: '36',
              value: baseFrom,
              onChange: (e) => setBaseFrom(Number(e.target.value)),
              className: 'w-full bg-gray-50 text-xl font-bold text-gray-900 outline-none p-4 rounded-xl border-2 border-gray-200 focus:border-blue-500 transition-all'
            })
          ),
          
          // Swap Button
          React.createElement('div', { className: 'flex justify-center mb-4' },
            React.createElement('button', {
              onClick: handleSwap,
              className: 'bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold transition-all shadow-sm'
            }, '⇅ Swap')
          ),
          
          // Base To
          React.createElement('div', { className: 'bg-white rounded-2xl p-6 shadow-sm mb-4' },
            React.createElement('label', { className: 'text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2 block' }, 'To Base'),
            React.createElement('input', {
              type: 'number',
              min: '2',
              max: '36',
              value: baseTo,
              onChange: (e) => setBaseTo(Number(e.target.value)),
              className: 'w-full bg-gray-50 text-xl font-bold text-gray-900 outline-none p-4 rounded-xl border-2 border-gray-200 focus:border-blue-500 transition-all'
            })
          ),
          
          // Result
          result && !error && React.createElement('div', { className: 'bg-gradient-to-br from-blue-50 to-purple-50 rounded-2xl p-6 shadow-sm border-2 border-blue-200' },
            React.createElement('label', { className: 'text-xs font-semibold text-blue-700 uppercase tracking-wide mb-2 block' }, 'Result'),
            React.createElement('div', { className: 'text-3xl font-bold text-gray-900 break-all' }, result),
            React.createElement('p', { className: 'text-sm text-gray-600 mt-2' }, `Base ${baseTo}`)
          ),
          
          // Quick Presets
          React.createElement('div', { className: 'mt-6' },
            React.createElement('h3', { className: 'text-sm font-semibold text-gray-700 mb-3' }, 'Quick Presets'),
            React.createElement('div', { className: 'grid grid-cols-2 gap-3' },
              [
                { label: 'Decimal → Binary', from: 10, to: 2, value: '255' },
                { label: 'Binary → Hex', from: 2, to: 16, value: '11111111' },
                { label: 'Hex → Decimal', from: 16, to: 10, value: 'FF' },
                { label: 'Octal → Decimal', from: 8, to: 10, value: '377' }
              ].map((preset, idx) =>
                React.createElement('button', {
                  key: idx,
                  onClick: () => {
                    setBaseFrom(preset.from);
                    setBaseTo(preset.to);
                    setInputValue(preset.value);
                  },
                  className: 'bg-white hover:bg-gray-50 rounded-xl p-4 shadow-sm border border-gray-200 text-left transition-all'
                },
                  React.createElement('p', { className: 'text-sm font-semibold text-gray-900' }, preset.label),
                  React.createElement('p', { className: 'text-xs text-gray-500 mt-1' }, preset.value)
                )
              )
            )
          )
        )
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(RadixConverter));
  </script>
</body>
</html>
